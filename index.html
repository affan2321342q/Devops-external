<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>My Todo App</h1>
        <div class="input-container">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Add a new task..." 
                autocomplete="off"
            >
            <button id="addBtn" onclick="addTodo()">Add Todo</button>
        </div>
        
        <div class="stats">
            <span>Total: <span id="totalCount">0</span></span>
            <span>Completed: <span id="completedCount">0</span></span>
        </div>

        <ul id="todoList" class="todo-list">
            <!-- Todos will be added here -->
        </ul>

        <button id="clearBtn" onclick="clearCompleted()" class="clear-btn">Clear Completed</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
